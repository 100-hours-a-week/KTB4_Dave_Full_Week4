spring:
  application:
    name: Community
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  jwt:
    secret: ${JWT_SECRET}


app:
  userFile: ./data/userdata.json
  userLikeFile: ./data/userlikedata.json
  postFile: ./data/postdata.json
  postEditFile: ./data/posteditrecorddata.json
  temporaryPostFile: ./data/temporarypostdata.json
  commentFile: ./data/commentdata.json
  refreshTokenFile: ./data/refreshtoken.json

tokenExpire:
  refresh: 1800000
  access: 600000

logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: TRACE
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: TRACE
    org.springframework.web.cors: TRACE
    org.springframework.security.web.FilterChainProxy: DEBUG
    org:
      springframework:
        jdbc:
          core:
            JdbcTemplate: DEBUG
            StatementCreatorUtils: TRACE